<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Only at The Kiosk — Coming Soon</title>
  <meta name="description" content="Only at The Kiosk is coming soon. Be the first to know when we drop.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="images/favicon.jpg" rel="shortcut icon" type="image/x-icon">
  <style>
    body{margin:0;background:#f4f0e8;color:#111;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}.wrap{max-width:1000px}.brand{font-size:clamp(52px,11vw,160px);line-height:.85;font-weight:900;letter-spacing:-.09em;text-transform:uppercase}.k{color:#ff5a1f}.text{margin-top:28px;font-size:clamp(20px,3vw,34px);font-weight:700}.btn{display:inline-block;margin-top:22px;padding:14px 24px;border-radius:999px;background:#111;color:#fff;text-decoration:none;font-weight:800;text-transform:uppercase;letter-spacing:.08em}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);align-items:center;justify-content:center;padding:20px}.box{background:#f4f0e8;color:#111;max-width:440px;width:100%;border-radius:24px;padding:28px;position:relative}.close{position:absolute;top:12px;right:16px;background:none;border:0;font-size:30px;cursor:pointer}.form{display:flex;gap:8px;margin-top:16px}.input{flex:1;padding:14px;border-radius:999px;border:1px solid #999}.submit{padding:14px 18px;border-radius:999px;border:0;background:#111;color:#fff;font-weight:800}@media(max-width:520px){.form{flex-direction:column}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="brand">Only at the <span class="k">K</span>IOSK.com</div>
    <div class="text">Be the first to know when we drop</div>
    <a href="#" id="notify-me-btn" class="btn">Notify Me</a>
  </main>
  <div id="email-modal" class="modal">
    <div class="box">
      <button id="close-modal" class="close">&times;</button>
      <h2>Be the first to know</h2>
      <p>Sign up to be notified when our store launches.</p>
      <form id="email-signup-form" class="form">
        <input id="email-input" class="input" type="email" placeholder="Enter your email" required>
        <button class="submit" type="submit">Sign Up</button>
      </form>
      <div id="form-message"></div>
    </div>
  </div>
  <script src="js/email-signup.js"></script>
</body>
</html>
